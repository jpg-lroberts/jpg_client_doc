<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JPtheGeek | Useful Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #f1f5f9;
      --surface:   #ffffff;
      --surface2:  #f8fafc;
      --border:    #e2e8f0;
      --border2:   #cbd5e1;
      --accent:    #2563eb;
      --accent-dim:  rgba(37,99,235,0.08);
      --accent-glow: rgba(37,99,235,0.18);
      --text:      #1e293b;
      --muted:     #94a3b8;
      --muted2:    #64748b;
      --tag-bg:    #eff6ff;
      --tag-text:  #2563eb;
      --radius:    10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(37,99,235,0.06) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -300px;
      right: -300px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(37,99,235,0.05) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 24px 80px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 44px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.5s ease both;
    }

    .logo-wrap img {
      height: 56px;
      width: auto;
      display: block;
    }

    .header-divider {
      width: 1px;
      height: 36px;
      background: var(--border2);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: var(--text);
      line-height: 1.2;
    }

    .header-text p {
      font-size: 12px;
      color: var(--muted2);
      margin-top: 3px;
      font-weight: 500;
    }

    .live-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(37,99,235,0.25);
      padding: 6px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.2s ease infinite;
      box-shadow: 0 0 6px var(--accent-glow);
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 36px;
      animation: fadeDown 0.45s 0.08s ease both;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 13px 16px 13px 44px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search::placeholder { color: var(--muted); }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    /* ── Section ── */
    .section {
      margin-bottom: 30px;
      animation: fadeUp 0.5s ease both;
    }

    .section:nth-child(1) { animation-delay: 0.12s; }
    .section:nth-child(2) { animation-delay: 0.18s; }
    .section:nth-child(3) { animation-delay: 0.24s; }
    .section:nth-child(4) { animation-delay: 0.30s; }
    .section:nth-child(5) { animation-delay: 0.36s; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .section-bar {
      width: 3px;
      height: 16px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .section-icon { font-size: 15px; flex-shrink: 0; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--muted2);
    }

    .section-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      background: var(--tag-bg);
      border: 1px solid var(--border2);
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: auto;
    }

    /* ── Cards ── */
    .cards { display: flex; flex-direction: column; gap: 5px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.18s, background 0.18s, transform 0.15s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: center;
      transition: transform 0.18s ease;
    }

    .card:hover {
      background: var(--surface2);
      border-color: rgba(37,99,235,0.3);
      transform: translateX(4px);
      box-shadow: 0 2px 16px rgba(37,99,235,0.08);
    }

    .card:hover::before { transform: scaleY(1); }

    .card-icon { font-size: 17px; flex-shrink: 0; width: 22px; text-align: center; }

    .card-body { flex: 1; min-width: 0; }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted2);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--tag-text);
      background: var(--tag-bg);
      padding: 3px 9px;
      border-radius: 5px;
      flex-shrink: 0;
      border: 1px solid rgba(37,99,235,0.18);
    }

    .card-arrow {
      color: var(--muted);
      font-size: 14px;
      flex-shrink: 0;
      font-weight: 600;
      transition: transform 0.15s, color 0.15s;
    }

    .card:hover .card-arrow { transform: translateX(3px); color: var(--accent); }

    /* ── Empty ── */
    #empty {
      display: none;
      text-align: center;
      padding: 64px 20px;
      color: var(--muted);
    }
    #empty .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }
    #empty p { font-size: 14px; font-weight: 500; }

    /* ── Footer ── */
    footer {
      margin-top: 56px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .tagline { color: var(--accent); font-weight: 500; font-size: 11px; }

    footer a { color: var(--accent); text-decoration: none; transition: opacity 0.15s; }
    footer a:hover { opacity: 0.7; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .card.hidden { display: none; }
    .card.company-hidden { display: none; }
    .section.all-hidden { display: none; }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo-wrap">
      <a href="https://jpthegeek.com" target="_blank" rel="noopener">
        <img src="JPTG-Speach-Bubble.png" alt="JPtheGeek" />
      </a>
    </div>
    <div class="header-divider"></div>
    <div class="header-text">
      <h1>Useful Links</h1>
      <p>Quick access to your portals &amp; tools</p>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      Quick Access
    </div>
  </header>

  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Search links…" autocomplete="off" spellcheck="false" />
  </div>

  <!-- ── SECTIONS ── rendered dynamically from links.json ── -->
  <div id="sections"></div>

  <div id="empty">
    <div class="empty-icon">🔍</div>
    <p>No links match your search.</p>
  </div>

  <footer>
    <a href="https://jpthegeek.com" target="_blank" rel="noopener" class="tagline">Good People, Great IT!</a>
    <a href="https://support.jpthegeek.com" target="_blank">Open a Ticket →</a>
  </footer>

</div>
<script>
  const search = document.getElementById('search');
  const empty  = document.getElementById('empty');
  const params  = new URLSearchParams(window.location.search);
  const company = (params.get('company_entity_id') || '').trim().toLowerCase();

  function updateView(q) {
    let anyVisible = false;
    document.querySelectorAll('[data-section]').forEach(section => {
      let sectionVisible = false;
      section.querySelectorAll('.card').forEach(card => {
        if (card.classList.contains('company-hidden')) return;
        const match = !q || card.textContent.toLowerCase().includes(q);
        card.classList.toggle('hidden', !match);
        if (match) sectionVisible = true;
      });
      section.classList.toggle('all-hidden', !sectionVisible);
      if (sectionVisible) anyVisible = true;
      const ct = section.querySelector('.section-count');
      if (ct) {
        const total   = section.querySelectorAll('.card:not(.company-hidden)').length;
        const visible = section.querySelectorAll('.card:not(.company-hidden):not(.hidden)').length;
        ct.textContent = q
          ? `${visible} result${visible !== 1 ? 's' : ''}`
          : `${total} link${total !== 1 ? 's' : ''}`;
      }
    });
    empty.style.display = anyVisible ? 'none' : 'block';
  }

  fetch('links.json')
    .then(r => r.json())
    .then(sections => {
      const container = document.getElementById('sections');
      sections.forEach(section => {
        const el = document.createElement('div');
        el.className = 'section';
        el.setAttribute('data-section', '');

        const cardsHTML = section.cards.filter(card => !card.disabled).map(card => {
          const restrict = card.restrictTo
            ? ` data-restrict-to="${card.restrictTo}"`
            : '';
          return `
          <a class="card" href="${card.url}" target="_blank" rel="noopener"${restrict}>
            <span class="card-icon">${card.icon}</span>
            <div class="card-body">
              <div class="card-title">${card.title}</div>
              <div class="card-desc">${card.description}</div>
            </div>
            <span class="card-tag">${card.tag}</span>
            <span class="card-arrow">→</span>
          </a>`;
        }).join('');

        el.innerHTML = `
          <div class="section-header">
            <div class="section-bar"></div>
            <span class="section-icon">${section.icon}</span>
            <span class="section-label">${section.label}</span>
            <span class="section-count"></span>
          </div>
          <div class="cards">${cardsHTML}</div>`;

        container.appendChild(el);
      });

      document.querySelectorAll('[data-restrict-to]').forEach(card => {
        const allowed = card.dataset.restrictTo.split(',').map(s => s.trim().toLowerCase());
        if (!allowed.includes(company)) card.classList.add('company-hidden');
      });

      updateView('');
      search.addEventListener('input', () => updateView(search.value.toLowerCase().trim()));
    });
</script>
</body>
</html>
